# Configuración de Spring Boot
# Esto es como el "manual de instrucciones" para Spring Boot

server:
  port: 8080  # Puerto donde corre el servidor

spring:
  application:
    name: event-service  # Nombre del servicio

  # Configuración de JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: validate  # Flyway maneja las migraciones, no Hibernate
    show-sql: true  # Mostrar SQL en logs (útil para debugging)
    properties:
      hibernate:
        format_sql: true  # Formatear SQL para mejor lectura
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
  # Configuración de Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Logging - Para ver qué está pasando
logging:
  level:
    com.eventmanagement: DEBUG  # Muestra logs detallados de nuestro código
    org.springframework: INFO   # Logs normales de Spring Boot
    org.hibernate.SQL: DEBUG    # Muestra queries SQL
    org.flywaydb: INFO          # Logs de Flyway migrations

---
# PERFIL: local (H2 in-memory para desarrollo rápido)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:events_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driver-class-name: org.h2.Driver

---
# PERFIL: localstack (PostgreSQL RDS en LocalStack - PRODUCCIÓN LOCAL)
spring:
  config:
    activate:
      on-profile: localstack
  datasource:
    url: jdbc:postgresql://localhost:4510/events_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
